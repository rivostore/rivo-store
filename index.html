<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE — PREDIUM KOLEKSİYASI</title>
  <style>
    /* Глобальный сброс стилей */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
      line-height: 1.4;
    }

    /* Тонкий минималистичный хедер RIVO */
    header {
      padding: 60px 20px 40px 20px;
      text-align: center;
      background: #ffffff;
      border-bottom: 1px solid #f5f5f5;
    }
    .logo {
      font-size: 32px;
      font-weight: 300;
      letter-spacing: 10px;
      text-transform: uppercase;
      text-decoration: none;
      color: #1a1a1a;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Контейнер каталога */
    .catalog-container {
      max-width: 1400px;
      margin: 0 auto;
      padding: 60px 20px 100px 20px;
    }

    /* Сетка товаров */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 60px 40px; /* Отступы между рядами и колонками */
    }
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background-color: #ffffff;
    }
    .img-wrapper {
      width: 100%;
      background: #fcfcfc; /* Чистый светлый фон */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 24px;
      height: 420px; /* Увеличенная высота для фото */
      overflow: hidden;
      border-radius: 4px;
    }
    .img-wrapper img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain; /* Вещи лежат ровно, как на витрине */
    }
    .brand {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 13px;
      color: #777777;
      margin-bottom: 16px;
    }
    .price {
      font-size: 20px;
      font-weight: 700;
      color: #111111;
      margin-bottom: 24px;
    }

    /* Темно-синяя кнопка заказа */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #111111;
      color: #ffffff;
      padding: 16px 0;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background-color 0.2s ease;
      width: 90%;
    }
    .btn-order:hover {
      background-color: #333333;
    }
    
    /* Футер */
    footer {
      background-color: #f9f9f9;
      color: #888888;
      padding: 60px 20px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1.2px;
      border-top: 1px solid #f0f0f0;
    }
  </style>
</head>
