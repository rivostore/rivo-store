<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* УЛЬТРА-МИНИМАЛИСТИЧНЫЙ ЛОГОТИП */
    header {
      padding: 80px 20px 50px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 22px;
      font-weight: 200;
      letter-spacing: 24px;
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: inline-block;
      padding-left: 24px; 
      opacity: 0.9;
    }

    /* Сетка каталога (ровно 3 товара в ряд) */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 100px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }

    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 60px;
      }
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #fcfcfc; 
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 400px;
      overflow: hidden;
      border-radius: 4px;
    }
    .img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .brand {
      font-size: 15px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #777777;
      margin-bottom: 12px;
    }
    .price {
      font-size: 16px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 20px;
    }

    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a1a;
      color: #ffffff;
      padding: 13px 0;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      width: 90%;
      transition: background-color 0.2s ease;
      border-radius: 4px;
    }
    .btn-order:hover {
      background-color: #000000;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">

  </main>

</body>
</html>
