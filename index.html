<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* УЛЬТРА-МИНИМАЛИСТИЧНЫЙ ЛОГОТИП */
    header {
      padding: 80px 20px 50px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 24px;
      font-weight: 200;
      letter-spacing: 20px;
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: inline-block;
      padding-left: 20px;
    }

    /* Сетка каталога под 4 товара */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 100px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 30px;
    }

    @media (max-width: 1024px) {
      .product-grid {
        grid-template-columns: repeat(2, 1fr);
        gap: 40px;
      }
    }
    @media (max-width: 576px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 50px;
      }
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #ffffff; 
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 350px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain;
    }
    .brand {
      font-size: 15px;
      font-weight: 500;
      color: #000000;
      margin-bottom: 4px;
      text-transform: uppercase;
      letter-spacing: 1px;
    }
    .model-name {
      font-size: 13px;
      color: #555555;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #888888;
      margin-bottom: 12px;
    }
    .price {
      font-size: 16px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 20px;
    }

    /* Премиальная кнопка заказа */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #1c1c1c;
      color: #ffffff;
      padding: 13px 0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      width: 95%;
      letter-spacing: 1px;
      transition: background-color 0.2s ease;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .btn-order:hover {
      background-color: #000000;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- 1. Rolex Datejust (Mint Green Dial) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1639006570490-79c0c53f1080?q=80&w=600&auto=format&fit=crop" alt="Rolex Datejust Mint Green">
        </div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Datejust 41</p>
        <p class="colors">Mint Green Dial</p>
        <p class="price">Qiymət üçün yazın</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rolex%20Datejust%20(Mint%20Green)%20saatı%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 2. Rolex Datejust (Blue Dial) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1547996160-81dfa63595aa?q=80&w=600&auto=format&fit=crop" alt="Rolex Datejust Blue">
        </div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Datejust 36</p>
        <p class="colors">Blue Diamond Dial</p>
        <p class="price">Qiymət üçün yazın</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rolex%20Datejust%20(Blue%20Dial)%20saatı%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 3. Rolex Datejust (Silver Dial) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1622434641406-a158123450f9?q=80&w=600&auto=format&fit=crop" alt="Rolex Datejust Silver">
        </div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Datejust 41</p>
        <p class="colors">Silver Dial</p>
        <p class="price">Qiymət üçün yazın</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rolex%20Datejust%20(Silver%20Dial)%20saatı%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 4. Rolex Sea-Dweller (Front View) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1523275335684-37898b6baf30?q=80&w=600&auto=format&fit=crop" alt="Rolex Sea-Dweller">
        </div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Sea-Dweller</p>
        <p class="colors">Oystersteel Black</p>
        <p class="price">Qiymət üçün yazın</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rolex%20Sea-Dweller%20saatı%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

</body>
</html>
