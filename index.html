<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background-color: #ffffff; color: #000000; }
    header { padding: 80px 20px 50px 20px; text-align: center; }
    .logo { font-size: 24px; font-weight: 200; letter-spacing: 20px; text-transform: uppercase; text-decoration: none; color: #000000; }
    .catalog-container { max-width: 1000px; margin: 0 auto; padding: 0 20px 100px 20px; }
    .product-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 60px; }
    @media (max-width: 600px) { .product-grid { grid-template-columns: 1fr; } }
    .product-card { display: flex; flex-direction: column; align-items: center; text-align: center; }
    .img-wrapper { width: 100%; height: 400px; display: flex; justify-content: center; align-items: center; margin-bottom: 20px; }
    .img-wrapper img { max-width: 100%; max-height: 100%; object-fit: contain; }
    .brand { font-size: 14px; text-transform: uppercase; margin-bottom: 5px; }
    .model-name { font-size: 16px; font-weight: 600; margin-bottom: 15px; }
    .btn-order { background-color: #000; color: #fff; padding: 12px 30px; text-decoration: none; font-size: 12px; text-transform: uppercase; }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- Datejust -->
      <div class="product-card">
        <div class="img-wrapper"><img src="rolex-datejust.jpg" alt="Rolex Datejust"></div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Datejust</p>
        <a href="https://wa.me/994507082548" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Sea-Dweller -->
      <div class="product-card">
        <div class="img-wrapper"><img src="rolex-sea-dweller.jpg" alt="Rolex Sea-Dweller"></div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Sea-Dweller</p>
        <a href="https://wa.me/994507082548" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Explorer -->
      <div class="product-card">
        <div class="img-wrapper"><img src="rolex-explorer.jpg" alt="Rolex Explorer"></div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Explorer</p>
        <a href="https://wa.me/994507082548" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Deepsea -->
      <div class="product-card">
        <div class="img-wrapper"><img src="rolex-deepsea.jpg" alt="Rolex Deepsea"></div>
        <h3 class="brand">Rolex</h3>
        <p class="model-name">Deepsea</p>
        <a href="https://wa.me/994507082548" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>
</body>
</html>
