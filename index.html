<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    /* Глобальный сброс стилей */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* Тонкий минималистичный хедер RIVO */
    header {
      padding: 50px 20px 30px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-decoration: none;
      color: #000033;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Контейнер каталога */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 80px 20px;
    }

    /* Сетка товаров */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
    }
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #fcfcfc; /* Чистый светлый фон */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 380px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain; /* Вещи лежат ровно, как на ладони */
    }
    .brand {
      font-size: 14px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 4px;
    }
    .colors {
      font-size: 12px;
      color: #777777;
      margin-bottom: 12px;
    }
    .price {
      font-size: 18px;
      font-weight: 700;
      color: #000033;
      margin-bottom: 20px;
    }

    /* Темно-синяя кнопка заказа */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000033;
      color: #ffffff;
      padding: 14px 0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background-color 0.2s ease;
      width: 85%;
    }
    .btn-order:hover {
      background-color: #000055;
    }
    
    /* Футер */
    footer {
      background-color: #ffffff;
      color: #999999;
      padding: 40px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      border-top: 1px solid #f5f5f5;
    }
  </style>
</head>
