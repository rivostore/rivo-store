<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE — Premium Catalog</title>
  <style>
    /* Глобальные стили */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
    }

    /* Фирменный минималистичный темно-синий хедер */
    header {
      padding: 40px 20px;
      text-align: center;
      border-bottom: 1px solid #f5f5f5;
    }
    .logo {
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 6px;
      text-transform: uppercase;
      text-decoration: none;
      color: #000033; /* Тот самый темно-синий RIVO */
      font-family: 'Arial Black', Gadget, sans-serif;
    }

    /* Контейнер каталога */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px 80px 20px;
    }

    /* Заголовок категории */
    .section-title {
      font-size: 18px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: #000033;
      margin: 20px 0 30px 0;
      padding-left: 10px;
      border-left: 4px solid #000033;
    }

    /* Сетка товаров ровно в ряд как в Diff */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
    }
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #fcfcfc;
      padding: 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      border-radius: 4px;
      border: 1px solid #f7f7f7;
      height: 360px; /* Высота под вертикальный формат карточек */
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 100%;
      height: 100%;
      object-fit: cover; /* Красивая посадка фото без искажений */
      border-radius: 2px;
    }
    .brand {
      font-size: 14px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #000033;
      margin-bottom: 4px;
    }
    .name {
      font-size: 14px;
      color: #555555;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #999999;
      margin-bottom: 12px;
    }
    .price {
      font-size: 18px;
      font-weight: 700;
      color: #000033;
      margin-bottom: 20px;
    }

    /* Фирменная темно-синяя кнопка */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000033;
      color: #ffffff;
      padding: 12px 0;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 4px;
      transition: background-color 0.2s ease, transform 0.1s ease;
      width: 85%;
    }
    .btn-order:hover {
      background-color: #000055;
    }
    .btn-order:active {
      transform: scale(0.98);
    }
    
    /* Минималистичный футер */
    footer {
      background-color: #000033;
      color: #ffffff;
      padding: 30px 20px;
      text-align: center;
      font-size: 12px;
      letter-spacing: 1px;
    }
  </style>
</head>
<body>

  <!-- МИНИМАЛИСТИЧНЫЙ ХЕДЕР -->
  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <!-- КАТАЛОГ С ВЕРТИКАЛЬНЫМИ ФОТО КОФТ -->
  <main class="catalog-container">
    <div class="section-title">Koftalar</div>
    
    <div class="product-grid">
      
      <!-- Карточка 1 -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=500&auto=format&fit=crop&q=80" alt="Rivo Premium Hoodie">
        </div>
        <h3 class="brand">Rivo Premium</h3>
        <p class="name">Minimalist Blank Hoodie</p>
        <p class="colors">2 Rəng</p>
        <p class="price">45 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Minimalist%20Blank%20Hoodie%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 2 -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=500&auto=format&fit=crop&q=80" alt="Rivo Sweatshirt">
        </div>
        <h3 class="brand">Rivo Luxury</h3>
        <p class="name">Heavyweight Knit Sweatshirt</p>
        <p class="colors">3 Rəng</p>
        <p class="price">40 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Heavyweight%20Knit%20Sweatshirt%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 3 -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=500&auto=format&fit=crop&q=80" alt="Rivo Zip Hoodie">
        </div>
        <h3 class="brand">Rivo Streetwear</h3>
        <p class="name">Oversized Zip-Up Hoodie</p>
        <p class="colors">2 Rəng</p>
        <p class="price">48 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Oversized%20Zip-Up%20Hoodie%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

  <!-- ФУТЕР -->
  <footer>
    &copy; 2026 RIVO STORE. Bütün hüquqlar qorunur.
  </footer>

</body>
</html>
