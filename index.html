<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DiffStyle Catalog</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      padding: 40px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
      max-width: 1200px;
      margin: 0 auto;
    }
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
      background: #fff;
    }
    .img-wrapper {
      width: 100%;
      background: #fcfcfc;
      padding: 30px 20px;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      border-radius: 4px;
    }
    .img-wrapper img {
      max-width: 100%;
      height: auto;
      object-fit: contain;
      mix-blend-mode: multiply;
    }
    .brand {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      color: #000000;
      margin-bottom: 4px;
    }
    .name {
      font-size: 14px;
      color: #555555;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #999999;
      margin-bottom: 12px;
    }
    .price {
      font-size: 18px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 20px;
    }
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: #111111;
      color: #ffffff;
      padding: 12px 32px;
      text-decoration: none;
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.5px;
      border-radius: 4px;
      transition: background-color 0.2s ease, transform 0.1s ease;
      width: 80%;
    }
    .btn-order:hover {
      background-color: #25D366; /* Переходит в классический зеленый WhatsApp при наведении */
    }
    .btn-order:active {
      transform: scale(0.98);
    }
  </style>
</head>
<body>

<div class="product-grid">
  <!-- Карточка 1 -->
  <div class="product-card">
    <div class="img-wrapper">
      <img src="hugo_boss_white.jpg" alt="Hugo Boss All-Over Logo T-Shirt">
    </div>
    <h3 class="brand">Hugo Boss</h3>
    <p class="name">All-Over Logo T-Shirt</p>
    <p class="colors">2 Rəng</p>
    <p class="price">33 ₼</p>
    <a href="https://wa.me/994705370001?text=Salam!%20DiffStyle%20saytından%20Hugo%20Boss%20All-Over%20Logo%20T-Shirt%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
  </div>

  <!-- Карточка 2 -->
  <div class="product-card">
    <div class="img-wrapper">
      <img src="hugo_boss_black.jpg" alt="Hugo Boss Cotton Logo Tee">
    </div>
    <h3 class="brand">Hugo Boss</h3>
    <p class="name">Cotton Logo Tee</p>
    <p class="colors">2 Rəng</p>
    <p class="price">33 ₼</p>
    <a href="https://wa.me/994705370001?text=Salam!%20DiffStyle%20saytından%20Hugo%20Boss%20Cotton%20Logo%20Tee%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
  </div>

  <!-- Карточка 3 -->
  <div class="product-card">
    <div class="img-wrapper">
      <img src="hermes_blue.jpg" alt="Hermes Stitched Horse Tee">
    </div>
    <h3 class="brand">Hermes</h3>
    <p class="name">Stitched Horse Tee</p>
    <p class="colors">2 Rəng</p>
    <p class="price">33 ₼</p>
    <a href="https://wa.me/994705370001?text=Salam!%20DiffStyle%20saytından%20Hermes%20Stitched%20Horse%20Tee%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
  </div>
</div>

</body>
</html>
