<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* УЛЬТРА-МИНИМАЛИСТИЧНЫЙ ЛОГОТИП */
    header {
      padding: 80px 20px 50px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 24px;
      font-weight: 200; /* Максимально тонкий */
      letter-spacing: 20px; /* Элегантный люксовый разряд букв */
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: inline-block;
      padding-left: 20px;
    }

    /* Сетка каталога (ровно 3 товара в ряд) */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 100px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }

    /* Мобильная адаптация */
    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 60px;
      }
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #ffffff; 
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 400px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain; /* Чтобы футболка лежала ровно на белом фоне */
    }
    .brand {
      font-size: 15px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #777777;
      margin-bottom: 12px;
    }
    .price {
      font-size: 16px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 20px;
    }

    /* Минималистичная кнопка в стиле DiffStyle */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a1a;
      color: #ffffff;
      padding: 13px 0;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      width: 90%;
      transition: background-color 0.2s ease;
      border-radius: 4px;
    }
    .btn-order:hover {
      background-color: #000000;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- 1. Hugo Boss Colorblock (Navy) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://assets.mixmatchme.de/images/products/1200/boss-t-shirt-tee-4-50469446-410_1.jpg" alt="Hugo Boss Cotton T-Shirt">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">3 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20Colorblock%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 2. Hugo Boss Logo Line (White) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://assets.mixmatchme.de/images/products/1200/boss-t-shirt-tee-gold-50468361-100_1.jpg" alt="Hugo Boss Cotton T-Shirt">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">3 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20White%20Logo%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 3. Hugo Boss Big Logo (Navy) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://assets.mixmatchme.de/images/products/1200/boss-t-shirt-t-logo-50469612-410_1.jpg" alt="Hugo Boss Cotton T-Shirt">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">1 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20Navy%20Logo%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

</body>
</html>
