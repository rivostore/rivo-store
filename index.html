<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    /* Глобальный сброс стилей */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* Ультра-минималистичный хедер с тонким шрифтом RIVO */
    header {
      padding: 50px 20px 30px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 28px;
      font-weight: 300; /* Тонкое, премиальное начертание */
      letter-spacing: 8px; /* Широкий благородный отступ */
      text-transform: uppercase;
      text-decoration: none;
      color: #000033; /* Фирменный темно-синий */
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Контейнер каталога */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 80px 20px;
    }

    /* Чистая сетка товаров в стиле студийного дропа Diff */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
    }
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #f7f7f7; /* Ровный студийный фон под вещи */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      border-radius: 0px; /* Строгий квадратный стиль */
      height: 380px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 100%;
      height: 100%;
      object-fit: cover; /* Чистая посадка без искажений */
    }
    .brand {
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: #000033;
      margin-bottom: 6px;
    }
    .name {
      font-size: 14px;
      color: #666666;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 11px;
      color: #999999;
      margin-bottom: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .price {
      font-size: 16px;
      font-weight: 600;
      color: #000033;
      margin-bottom: 20px;
    }

    /* Аккуратная темно-синяя кнопка */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000033;
      color: #ffffff;
      padding: 12px 0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background-color 0.2s ease, opacity 0.2s ease;
      width: 85%;
    }
    .btn-order:hover {
      background-color: #000055;
      opacity: 0.9;
    }
    
    /* Минималистичный футер */
    footer {
      background-color: #ffffff;
      color: #999999;
      padding: 40px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      border-top: 1px solid #f5f5f5;
    }
  </style>
</head>
<body>

  <!-- ХЕДЕР С ТОНКИМ ШРИФТОМ RIVO -->
  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <!-- КАТАЛОГ С СТУДИЙНЫМИ ФОТО В СТИЛЕ DIFF -->
  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- Карточка 1 -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1556821840-3a63f95609a7?w=600&auto=format&fit=crop&q=80" alt="Rivo Premium Hoodie">
        </div>
        <h3 class="brand">Rivo Premium</h3>
        <p class="name">Minimalist Heavy Hoodie</p>
        <p class="colors">2 Rəng</p>
        <p class="price">45 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Minimalist%20Heavy%20Hoodie%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 2 -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1620799140408-edc6dcb6d633?w=600&auto=format&fit=crop&q=80" alt="Rivo Knit Sweatshirt">
        </div>
        <h3 class="brand">Rivo Luxury</h3>
        <p class="name">Studio Knit Sweatshirt</p>
        <p class="colors">3 Rəng</p>
        <p class="price">40 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Studio%20Knit%20Sweatshirt%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 3 -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1543163521-1bf539c55dd2?w=600&auto=format&fit=crop&q=80" alt="Rivo Zip-Up">
        </div>
        <h3 class="brand">Rivo Streetwear</h3>
        <p class="name">Oversized Zip Hoodie</p>
        <p class="colors">2 Rəng</p>
        <p class="price">48 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Oversized%20Zip%20Hoodie%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

  <!-- ФУТЕР -->
  <footer>
    &copy; 2026 RIVO STORE. BÜTÜN HÜQUQLAR QORUNUR.
  </footer>

</body>
</html>
