<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RIVO Store | Premium Kişi Geyimləri</title>
    
    <!-- Это то, что вы вставили на 7-ю строку (оставляем!) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Montserrat', sans-serif;
            background-color: #fff;
            color: #0B2345;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 5%;
            border-bottom: 1px solid #f5f5f5;
        }

        .logo {
            font-size: 24px;
            font-weight: 600;
            letter-spacing: 2px;
        }

        .nav-links {
            list-style: none;
            display: flex;
            gap: 30px;
            margin: 0;
            padding: 0;
        }

        .nav-links a {
            text-decoration: none;
            color: #0B2345;
            font-weight: 400;
            font-size: 14px;
            transition: color 0.3s;
        }

        .nav-links a:hover {
            color: #707070;
        }

        .user-actions {
            display: flex;
            gap: 20px;
        }

        .user-actions a {
            text-decoration: none;
            color: #0B2345;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <!-- Вот этот контент на азербайджанском теперь будет внутри body -->
    <header>
        <div class="logo">RIVO</div>
        
        <nav>
            <ul class="nav-links">
                <li><a href="#">Yeni</a></li>
                <li><a href="#">Kataloq</a></li>
                <li><a href="#">Endirimlər</a></li>
                <li><a href="#">Haqqımızda</a></li>
            </ul>
        </nav>
        
        <div class="user-actions">
            <a href="#">Axtar</a>
            <a href="#">Hesabım</a>
            <a href="#">Səbət (0)</a>
        </div>
    </header>

    <main>
        <!-- Əsas Banner (Hero Section) -->
        <section class="hero-section" style="display: flex; align-items: center; justify-content: space-between; padding: 60px 5%; background-color: #f9f9f9; min-height: 70vh;">
            <div class="hero-text" style="max-width: 500px;">
                <h2 style="font-size: 48px; font-weight: 500; margin-bottom: 20px; line-height: 1.2;">Müasir Stil və Premium Keyfiyyət</h2>
                <p style="font-size: 16px; color: #707070; margin-bottom: 30px; line-height: 1.6;">Yeni kolleksiyamızla üslubunuzu yeniləyin. Hər bir detal sizin rahatlığınız və zərifliyiniz üçün düşünülüb.</p>
                <a href="#" style="display: inline-block; padding: 15px 35px; background-color: #0B2345; color: #fff; text-decoration: none; font-size: 14px; font-weight: 500; letter-spacing: 1px;">Kolleksiyanı Kəşf Et</a>
            </div>
            <div class="hero-image" style="width: 50%; max-width: 600px;">
                <div style="width: 100%; height: 450px; background-color: #e0e0e0; display: flex; align-items: center; justify-content: center; color: #707070;">Premium Image Placeholder</div>
            </div>
        </section>
    </main>

</body>
</html>
