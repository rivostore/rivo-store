<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    /* Глобальный сброс стилей */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* Тонкий минималистичный хедер RIVO */
    header {
      padding: 50px 20px 30px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-decoration: none;
      color: #000033;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Контейнер каталога */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 80px 20px;
    }

    /* Сетка товаров в стиле DiffStyle */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
    }
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #ffffff; /* Белый фон под вырезанные футболки */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      border-radius: 0px;
      height: 380px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 90%;
      max-height: 90%;
      object-fit: contain; /* Чтобы вещи не растягивались и были как на ладони */
    }
    .brand {
      font-size: 14px;
      font-weight: 400;
      text-transform: none;
      color: #000000;
      margin-bottom: 4px;
    }
    .colors {
      font-size: 12px;
      color: #777777;
      margin-bottom: 12px;
    }
    .price {
      font-size: 18px;
      font-weight: 700;
      color: #000033;
      margin-bottom: 20px;
    }

    /* Темно-синяя кнопка заказа */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000033;
      color: #ffffff;
      padding: 12px 0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background-color 0.2s ease, opacity 0.2s ease;
      width: 85%;
    }
    .btn-order:hover {
      background-color: #000055;
      opacity: 0.9;
    }
    
    /* Футер */
    footer {
      background-color: #ffffff;
      color: #999999;
      padding: 40px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      border-top: 1px solid #f5f5f5;
    }
  </style>
</head>
<body>

  <!-- ХЕДЕР -->
  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <!-- КАТАЛОГ С ЧИСТЫМИ ФОТО ВЕЩЕЙ -->
  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- Карточка 1: Белая Hugo Boss с принтом -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://assets.gq.ru/photos/6082a93ce4e39b7a42168fd1/master/w_960%2cc_limit/1.jpg" alt="Hugo Boss Cotton T-Shirt White">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Hugo%20Boss%20Cotton%20T-Shirt%20White%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 2: Черная Hugo Boss с маленьким лого -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.hugoboss.com/is/image/boss/hbeu50468364_001_220" alt="Hugo Boss Cotton T-Shirt Black">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Hugo%20Boss%20Cotton%20T-Shirt%20Black%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 3: Синяя Hermes с лошадью -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://assets.hermes.com/is/image/hermesproduct/h167590ha01_front" alt="Hermes Cotton T-Shirt">
        </div>
        <h3 class="brand">Hermes Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Hermes%20Cotton%20T-Shirt%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

  <!-- ФУТЕР -->
  <footer>
    &copy; 2026 RIVO STORE. BÜTÜN HÜQUQLAR QORUNUR.
  </footer>

</body>
</html>
