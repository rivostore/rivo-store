<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* УЛЬТРА-МИНИМАЛИСТИЧНЫЙ ЛОГОТИП */
    header {
      padding: 70px 20px 40px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 20px;
      font-weight: 200; /* Очень тонкий */
      letter-spacing: 24px; /* Огромный премиальный разряд букв */
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: inline-block;
      padding-left: 24px; 
      opacity: 0.85;
    }

    /* Сетка каталога (ровно 3 товара в ряд) */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 100px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }

    /* Мобильная адаптация */
    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 60px;
      }
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #ffffff; 
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 400px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .brand {
      font-size: 15px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #777777;
      margin-bottom: 12px;
    }
    .price {
      font-size: 16px;
      font-weight: 700;
      color: #000000;
      margin-bottom: 20px;
    }

    /* Минималистичная кнопка */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #1a1a1a;
      color: #ffffff;
      padding: 13px 0;
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      width: 90%;
      transition: background-color 0.2s ease;
      border-radius: 4px;
    }
    .btn-order:hover {
      background-color: #000000;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- 1. Hugo Boss Colorblock (Navy) -->
      <div class="product-card">
        <div class="img-wrapper">
          <!-- Картинка вшита прямо в код, она загрузится 100% -->
          <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400' width='100%' height='100%'>
            <rect width='100%' height='100%' fill='white'/>
            <!-- Рукава -->
            <path d='M 70,160 L 120,120 L 150,150 L 130,210 L 100,200 Z' fill='%231d3557'/>
            <path d='M 330,160 L 280,120 L 250,150 L 270,210 L 300,200 Z' fill='%231d3557'/>
            <!-- Тело (Сине-голубой колорблок) -->
            <path d='M 120,120 L 280,120 L 270,360 L 130,360 Z' fill='%231d3557'/>
            <rect x='126' y='180' width='148' height='40' fill='%234ba3a5'/>
            <rect x='128' y='220' width='144' height='30' fill='%23a8dadc'/>
            <rect x='129' y='250' width='142' height='15' fill='%23e6e6e6'/>
            <!-- Воротник -->
            <path d='M 170,120 Q 200,145 230,120 Z' fill='white'/>
            <path d='M 170,120 Q 200,145 230,120' stroke='%2312223a' stroke-width='3' fill='none'/>
            <!-- Надпись BOSS -->
            <text x='200' y='173' font-family='Arial, sans-serif' font-weight='bold' font-size='10' fill='white' text-anchor='middle' letter-spacing='1'>BOSS</text>
          </svg>" alt="Hugo Boss Cotton T-Shirt">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">3 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20Colorblock%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 2. Hugo Boss Logo Line (White) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400' width='100%' height='100%'>
            <rect width='100%' height='100%' fill='white'/>
            <!-- Футболка -->
            <path d='M 70,160 L 120,120 L 150,150 L 130,210 L 100,200 Z' fill='%23f7f7f7' stroke='%23e0e0e0' stroke-width='1'/>
            <path d='M 330,160 L 280,120 L 250,150 L 270,210 L 300,200 Z' fill='%23f7f7f7' stroke='%23e0e0e0' stroke-width='1'/>
            <path d='M 120,120 L 280,120 L 270,360 L 130,360 Z' fill='%23f7f7f7' stroke='%23e0e0e0' stroke-width='1'/>
            <path d='M 170,120 Q 200,140 230,120 Z' fill='white'/>
            <path d='M 170,120 Q 200,140 230,120' stroke='%23e0e0e0' stroke-width='2' fill='none'/>
            <!-- Полосы и Лого -->
            <line x1='125' y1='195' x2='275' y2='195' stroke='black' stroke-width='1.5'/>
            <line x1='125' y1='200' x2='275' y2='200' stroke='black' stroke-width='1.5'/>
            <rect x='185' y='190' width='30' height='14' fill='%23f7f7f7'/>
            <text x='200' y='201' font-family='Arial, sans-serif' font-weight='bold' font-size='11' fill='black' text-anchor='middle' letter-spacing='0.5'>BOSS</text>
            <!-- Бирка (Зеленая сбоку) -->
            <polygon points='175,140 190,145 180,175 165,170' fill='%232b4c3f'/>
            <line x1='182' y1='125' x2='175' y2='140' stroke='%23a3b899' stroke-width='1.5'/>
            <text x='178' y='160' font-family='Arial, sans-serif' font-size='6' fill='%23a3b899' transform='rotate(18 178 160)' text-anchor='middle'>BOSS</text>
          </svg>" alt="Hugo Boss Cotton T-Shirt">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">3 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20White%20Logo%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 3. Hugo Boss Big Logo (Navy) -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 400 400' width='100%' height='100%'>
            <rect width='100%' height='100%' fill='white'/>
            <!-- Рукава -->
            <path d='M 70,160 L 120,120 L 150,150 L 130,210 L 100,200 Z' fill='%231c2541'/>
            <path d='M 330,160 L 280,120 L 250,150 L 270,210 L 300,200 Z' fill='%231c2541'/>
            <!-- Тело -->
            <path d='M 120,120 L 280,120 L 270,360 L 130,360 Z' fill='%231c2541'/>
            <path d='M 170,120 Q 200,145 230,120 Z' fill='white'/>
            <!-- Квадратное лого BOSS -->
            <g fill='white' font-family='Arial, sans-serif' font-weight='bold' font-size='32' text-anchor='middle'>
              <text x='180' y='210'>B</text>
              <text x='220' y='210'>O</text>
              <text x='180' y='245'>S</text>
              <text x='220' y='245'>S</text>
            </g>
            <!-- Черная бирка на веревочке -->
            <polygon points='260,150 280,160 270,195 250,185' fill='%23111111'/>
            <line x1='252' y1='128' x2='260' y2='150' stroke='%23555555' stroke-width='1'/>
            <text x='265' y='178' font-family='Arial, sans-serif' font-size='7' fill='white' transform='rotate(26 265 178)' text-anchor='middle'>BOSS</text>
          </svg>" alt="Hugo Boss Cotton T-Shirt">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">1 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20Navy%20Logo%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

</body>
</html>
