<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    /* Глобальный сброс стилей */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* Тонкий минималистичный хедер RIVO */
    header {
      padding: 50px 20px 30px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 28px;
      font-weight: 300;
      letter-spacing: 8px;
      text-transform: uppercase;
      text-decoration: none;
      color: #000033;
      font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    }

    /* Контейнер каталога */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px 20px 80px 20px;
    }

    /* Сетка товаров в стиле Diff */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 40px;
    }
    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #f7f7f7; /* Мягкий студийный фон */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 380px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 75%;
      max-height: 75%;
      object-fit: contain;
    }
    .brand {
      font-size: 14px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 4px;
    }
    .colors {
      font-size: 12px;
      color: #777777;
      margin-bottom: 12px;
    }
    .price {
      font-size: 18px;
      font-weight: 700;
      color: #000033;
      margin-bottom: 20px;
    }

    /* Аккуратная темно-синяя кнопка заказа */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000033;
      color: #ffffff;
      padding: 14px 0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      border-radius: 2px;
      transition: background-color 0.2s ease;
      width: 85%;
    }
    .btn-order:hover {
      background-color: #000055;
    }
    
    /* Футер */
    footer {
      background-color: #ffffff;
      color: #999999;
      padding: 40px 20px;
      text-align: center;
      font-size: 11px;
      letter-spacing: 1px;
      border-top: 1px solid #f5f5f5;
    }
  </style>
</head>
<body>

  <!-- ХЕДЕР RIVO -->
  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <!-- КАТАЛОГ С ВСТРОЕННЫМИ КАРТИНКАМИ ФУТБОЛОК -->
  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- Карточка 1: Белая футболка -->
      <div class="product-card">
        <div class="img-wrapper">
          <!-- Картинка зашита прямо в код через SVG Base64 -->
          <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M20,20 L30,10 L40,18 L50,12 L60,18 L70,10 L80,20 L85,55 L75,58 L72,85 L28,85 L25,58 L15,55 Z' fill='%23ffffff' stroke='%23e0e0e0' stroke-width='1.5'/></svg>" alt="Hugo Boss Cotton T-Shirt White">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Hugo%20Boss%20Cotton%20T-Shirt%20White%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 2: Черная футболка -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M20,20 L30,10 L40,18 L50,12 L60,18 L70,10 L80,20 L85,55 L75,58 L72,85 L28,85 L25,58 L15,55 Z' fill='%231a1a2e' stroke='%230f0f1b' stroke-width='1.5'/></svg>" alt="Hugo Boss Cotton T-Shirt Black">
        </div>
        <h3 class="brand">Hugo Boss Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Hugo%20Boss%20Cotton%20T-Shirt%20Black%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- Карточка 3: Синяя футболка -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><path d='M20,20 L30,10 L40,18 L50,12 L60,18 L70,10 L80,20 L85,55 L75,58 L72,85 L28,85 L25,58 L15,55 Z' fill='%23000033' stroke='%23000022' stroke-width='1.5'/></svg>" alt="Hermes Cotton T-Shirt">
        </div>
        <h3 class="brand">Hermes Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Rivo%20Store%20saytından%20Hermes%20Cotton%20T-Shirt%20(33%20AZN)%20ilə%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

  <!-- ФУТЕР -->
  <footer>
    &copy; 2026 RIVO STORE. BÜTÜN HÜQUQLAR QORUNUR.
  </footer>

</body>
</html>
