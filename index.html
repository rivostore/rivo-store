<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* УЛЬТРА-МИНИМАЛИСТИЧНЫЙ ЛОГОТИП */
    header {
      padding: 90px 20px 70px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 22px;
      font-weight: 200;
      letter-spacing: 18px;
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      display: inline-block;
      padding-left: 18px;
    }

    /* Сетка каталога (ровно 3 товара в ряд) */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 120px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 40px;
    }

    /* Мобильная адаптация */
    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 60px;
      }
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #ffffff; 
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 25px;
      height: 420px;
      overflow: hidden;
    }
    .img-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 2px;
    }
    .brand {
      font-size: 14px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
      letter-spacing: 0.5px;
    }
    .colors {
      font-size: 12px;
      color: #777777;
      margin-bottom: 14px;
    }
    .price {
      font-size: 15px;
      font-weight: 600;
      color: #000000;
      margin-bottom: 22px;
    }

    /* Кнопка заказа */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      color: #ffffff;
      padding: 14px 0;
      text-decoration: none;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      width: 100%;
      transition: background-color 0.2s ease, opacity 0.2s ease;
      border-radius: 0px;
    }
    .btn-order:hover {
      background-color: #111111;
      opacity: 0.9;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- 1. BOSS Navy T-Shirt -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1521572267360-ee0c2909d518?auto=format&fit=crop&w=600&q=80" alt="BOSS Navy T-Shirt">
        </div>
        <h3 class="brand">BOSS Cotton T-Shirt (Navy)</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20Navy%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 2. BOSS White T-Shirt -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1583743814966-8936f5b7be1a?auto=format&fit=crop&w=600&q=80" alt="BOSS White T-Shirt">
        </div>
        <h3 class="brand">BOSS Cotton T-Shirt (White)</h3>
        <p class="colors">1 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20White%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 3. BOSS Black T-Shirt -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://images.unsplash.com/photo-1503342217505-b0a15ec3261c?auto=format&fit=crop&w=600&q=80" alt="BOSS Black T-Shirt">
        </div>
        <h3 class="brand">BOSS Cotton T-Shirt (Black)</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Hugo%20Boss%20Black%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

</body>
</html>
