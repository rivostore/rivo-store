<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* УЛЬТРА-МИНИМАЛИСТИЧНЫЙ ЛОГОТИП */
    header {
      padding: 80px 20px 60px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 24px;
      font-weight: 200; /* Максимально тонкий */
      letter-spacing: 16px; /* Элегантный большой отступ */
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      opacity: 0.9;
    }

    /* Сетка каталога (ровно 3 товара в ряд) */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 100px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 30px;
    }

    /* Адаптив под мобильные устройства */
    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 50px;
      }
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #fcfcfc; /* Мягкий минималистичный фон для карточки */
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 400px;
      overflow: hidden;
      border-radius: 4px;
    }
    .img-wrapper svg {
      width: 70%;
      height: 70%;
    }
    .brand {
      font-size: 15px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #888888;
      margin-bottom: 12px;
    }
    .price {
      font-size: 16px;
      font-weight: 600;
      color: #000000;
      margin-bottom: 20px;
    }

    /* Стильная монохромная кнопка */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      color: #ffffff;
      padding: 14px 0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
      transition: opacity 0.2s ease;
      border-radius: 2px;
    }
    .btn-order:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- 1. Brunello Cucinelli -->
      <div class="product-card">
        <div class="img-wrapper">
          <!-- Автономный силуэт футболки (Navy) -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#1e293b" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9a1 1 0 0 1-.7-1.7l3-3a1 1 0 0 1 1.4 0l1.8 1.8a2 2 0 0 0 2.8 0L14.1 4.3a1 1 0 0 1 1.4 0l3 3A1 1 0 0 1 17.8 9H16v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9H4z"/>
          </svg>
        </div>
        <h3 class="brand">Brunello Cucinelli Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Brunello%20Cucinelli%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 2. Stefano Ricci -->
      <div class="product-card">
        <div class="img-wrapper">
          <!-- Автономный силуэт футболки (White/Gray) -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#64748b" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9a1 1 0 0 1-.7-1.7l3-3a1 1 0 0 1 1.4 0l1.8 1.8a2 2 0 0 0 2.8 0L14.1 4.3a1 1 0 0 1 1.4 0l3 3A1 1 0 0 1 17.8 9H16v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9H4z"/>
          </svg>
        </div>
        <h3 class="brand">Stefano Ricci Cotton T-Shirt</h3>
        <p class="colors">1 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Stefano%20Ricci%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 3. Loro Piana -->
      <div class="product-card">
        <div class="img-wrapper">
          <!-- Автономный силуэт футболки (Dark) -->
          <svg viewBox="0 0 24 24" fill="none" stroke="#0f172a" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 9a1 1 0 0 1-.7-1.7l3-3a1 1 0 0 1 1.4 0l1.8 1.8a2 2 0 0 0 2.8 0L14.1 4.3a1 1 0 0 1 1.4 0l3 3A1 1 0 0 1 17.8 9H16v10a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2V9H4z"/>
          </svg>
        </div>
        <h3 class="brand">Loro Piana Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Loro%20Piana%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

</body>
</html>
