<!DOCTYPE html>
<html lang="az">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RIVO STORE</title>
  <style>
    /* Базовые стили */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      font-family: '-apple-system', BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
      background-color: #ffffff;
      color: #000000;
      -webkit-font-smoothing: antialiased;
    }

    /* УЛЬТРА-МИНИМАЛИСТИЧНЫЙ ЛОГОТИП */
    header {
      padding: 80px 20px 60px 20px;
      text-align: center;
      background: #ffffff;
    }
    .logo {
      font-size: 24px;
      font-weight: 200; /* Очень тонкий шрифт */
      letter-spacing: 14px; /* Большое расстояние между буквами */
      text-transform: uppercase;
      text-decoration: none;
      color: #000000;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      opacity: 0.9;
    }

    /* Сетка каталога (ровно 3 товара в ряд) */
    .catalog-container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 0 20px 100px 20px;
    }
    .product-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr); /* Ровно 3 колонки */
      gap: 30px;
    }

    /* Адаптив под мобилки (чтобы на телефонах они вставали в 1 колонку) */
    @media (max-width: 768px) {
      .product-grid {
        grid-template-columns: 1fr;
        gap: 50px;
      }
    }

    .product-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-align: center;
    }
    .img-wrapper {
      width: 100%;
      background: #ffffff;
      display: flex;
      justify-content: center;
      align-items: center;
      margin-bottom: 20px;
      height: 400px;
      overflow: hidden;
    }
    .img-wrapper img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }
    .brand {
      font-size: 15px;
      font-weight: 400;
      color: #000000;
      margin-bottom: 6px;
    }
    .colors {
      font-size: 12px;
      color: #888888;
      margin-bottom: 12px;
    }
    .price {
      font-size: 16px;
      font-weight: 600;
      color: #000000;
      margin-bottom: 20px;
    }

    /* Минималистичная кнопка */
    .btn-order {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background-color: #000000;
      color: #ffffff;
      padding: 12px 0;
      text-decoration: none;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 1px;
      text-transform: uppercase;
      width: 100%;
      transition: opacity 0.2s ease;
    }
    .btn-order:hover {
      opacity: 0.8;
    }
  </style>
</head>
<body>

  <header>
    <a href="#" class="logo">RIVO</a>
  </header>

  <main class="catalog-container">
    <div class="product-grid">
      
      <!-- 1. Brunello Cucinelli -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://i.postimg.co/2544pt46/cuc.jpg" alt="Brunello Cucinelli">
        </div>
        <h3 class="brand">Brunello Cucinelli Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Brunello%20Cucinelli%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 2. Stefano Ricci -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://i.postimg.co/c4cvzNgx/ric.jpg" alt="Stefano Ricci">
        </div>
        <h3 class="brand">Stefano Ricci Cotton T-Shirt</h3>
        <p class="colors">1 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Stefano%20Ricci%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

      <!-- 3. Loro Piana -->
      <div class="product-card">
        <div class="img-wrapper">
          <img src="https://i.postimg.co/bNJj858m/loro.jpg" alt="Loro Piana">
        </div>
        <h3 class="brand">Loro Piana Cotton T-Shirt</h3>
        <p class="colors">2 Rəng</p>
        <p class="price">33 ₼</p>
        <a href="https://wa.me/994507082548?text=Salam!%20Loro%20Piana%20maraqlanıram." target="_blank" class="btn-order">Sifariş ver</a>
      </div>

    </div>
  </main>

</body>
</html>
